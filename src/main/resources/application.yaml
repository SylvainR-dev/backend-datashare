spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/datashare
    username: datashare
    password: datashare
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect